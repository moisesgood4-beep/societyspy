<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brutus - RDP Web Terminal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}
#header {
    width: 100%;
    padding: 8px 16px;
    background: #2d2d2d;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
}
#header .title {
    font-weight: bold;
    color: #ff6b6b;
    font-size: 14px;
}
#header .target {
    color: #69db7c;
    font-family: monospace;
}
#header .status {
    margin-left: auto;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 12px;
}
.status-connected { background: #2b8a3e; color: white; }
.status-disconnected { background: #c92a2a; color: white; }
.status-connecting { background: #e67700; color: white; }
#canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    position: relative;
}
#disconnect-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    color: #ff6b6b;
    font-size: 18px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
}
#disconnect-overlay.visible { display: flex; }
#disconnect-overlay .detail {
    color: #aaa;
    font-size: 12px;
    max-width: 80%;
    text-align: center;
    word-break: break-word;
}
#reconnect-btn {
    margin-top: 12px;
    padding: 8px 24px;
    background: #2b8a3e;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
}
#reconnect-btn:hover { background: #2f9e44; }
#reconnect-btn:disabled { background: #555; cursor: not-allowed; }
canvas {
    cursor: default;
    image-rendering: auto;
    border: 1px solid #444;
    max-width: 100%;
    max-height: 100%;
}
#footer {
    width: 100%;
    padding: 4px 16px;
    background: #2d2d2d;
    border-top: 1px solid #444;
    font-size: 11px;
    color: #888;
    display: flex;
    gap: 16px;
}
#fps { color: #69db7c; }
</style>
</head>
<body>
<div id="header">
    <span class="title">BRUTUS RDP</span>
    <span class="target" id="target">-</span>
    <span class="status status-connecting" id="status">Connecting...</span>
</div>
<div id="canvas-container">
    <canvas id="screen" tabindex="0"></canvas>
    <div id="disconnect-overlay">
        <span>Session Disconnected</span>
        <span class="detail" id="disconnect-detail"></span>
        <button id="reconnect-btn">Reconnect</button>
    </div>
</div>
<div id="footer">
    <span id="fps">0 FPS</span>
    <span id="resolution">-</span>
    <span>Click canvas to focus | Keyboard & mouse forwarded to RDP session</span>
</div>

<script>
(function() {
    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const targetEl = document.getElementById('target');
    const fpsEl = document.getElementById('fps');
    const resEl = document.getElementById('resolution');
    const overlayEl = document.getElementById('disconnect-overlay');
    const detailEl = document.getElementById('disconnect-detail');
    const reconnectBtn = document.getElementById('reconnect-btn');

    let ws = null;
    let frameCount = 0;
    let lastFpsTime = Date.now();
    let screenWidth = 1024;
    let screenHeight = 768;
    let currentToken = null;

    // Fetch server info to get WebSocket token
    fetch('/info')
        .then(r => r.json())
        .then(info => {
            screenWidth = info.width;
            screenHeight = info.height;
            canvas.width = screenWidth;
            canvas.height = screenHeight;
            targetEl.textContent = info.target;
            resEl.textContent = screenWidth + 'x' + screenHeight;
            currentToken = info.token;
            connect(currentToken);
        })
        .catch(err => {
            statusEl.textContent = 'Error: ' + err;
            statusEl.className = 'status status-disconnected';
        });

    function connect(token) {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + '/ws?token=' + encodeURIComponent(token));
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            statusEl.textContent = 'Connected';
            statusEl.className = 'status status-connected';
            canvas.focus();
        };

        ws.onclose = () => {
            showDisconnect('WebSocket connection closed');
        };

        ws.onerror = () => {
            statusEl.textContent = 'Error';
            statusEl.className = 'status status-disconnected';
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'frame' && msg.data) {
                    renderFrame(msg.data);
                } else if (msg.type === 'error') {
                    showDisconnect(msg.error || 'Unknown error');
                }
            } catch(e) {}
        };
    }

    function showDisconnect(reason) {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'status status-disconnected';
        detailEl.textContent = reason;
        overlayEl.classList.add('visible');
    }

    reconnectBtn.addEventListener('click', doReconnect);

    function doReconnect() {
        reconnectBtn.disabled = true;
        reconnectBtn.textContent = 'Reconnecting...';
        statusEl.textContent = 'Reconnecting...';
        statusEl.className = 'status status-connecting';

        // Close existing WebSocket
        if (ws) {
            ws.onclose = null; // prevent triggering disconnect again
            ws.close();
            ws = null;
        }

        // Call /reconnect endpoint
        fetch('/reconnect?token=' + encodeURIComponent(currentToken), { method: 'POST' })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(j) { return Promise.reject(new Error(j.error || 'Reconnect failed')); });
                return r.json();
            })
            .then(function() {
                // Hide overlay, reconnect WebSocket
                overlayEl.classList.remove('visible');
                reconnectBtn.disabled = false;
                reconnectBtn.textContent = 'Reconnect';
                connect(currentToken);
            })
            .catch(function(err) {
                detailEl.textContent = 'Reconnect failed: ' + err.message;
                reconnectBtn.disabled = false;
                reconnectBtn.textContent = 'Reconnect';
            });
    }

    function renderFrame(b64data) {
        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0);
            frameCount++;
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                fpsEl.textContent = frameCount + ' FPS';
                frameCount = 0;
                lastFpsTime = now;
            }
        };
        img.src = 'data:image/jpeg;base64,' + b64data;
    }

    // Scancode mapping from JS KeyboardEvent.code to PS/2 Set 1
    const codeToScancode = {
        'KeyA':0x1E,'KeyB':0x30,'KeyC':0x2E,'KeyD':0x20,'KeyE':0x12,'KeyF':0x21,
        'KeyG':0x22,'KeyH':0x23,'KeyI':0x17,'KeyJ':0x24,'KeyK':0x25,'KeyL':0x26,
        'KeyM':0x32,'KeyN':0x31,'KeyO':0x18,'KeyP':0x19,'KeyQ':0x10,'KeyR':0x13,
        'KeyS':0x1F,'KeyT':0x14,'KeyU':0x16,'KeyV':0x2F,'KeyW':0x11,'KeyX':0x2D,
        'KeyY':0x15,'KeyZ':0x2C,
        'Digit1':0x02,'Digit2':0x03,'Digit3':0x04,'Digit4':0x05,'Digit5':0x06,
        'Digit6':0x07,'Digit7':0x08,'Digit8':0x09,'Digit9':0x0A,'Digit0':0x0B,
        'F1':0x3B,'F2':0x3C,'F3':0x3D,'F4':0x3E,'F5':0x3F,'F6':0x40,
        'F7':0x41,'F8':0x42,'F9':0x43,'F10':0x44,'F11':0x57,'F12':0x58,
        'ShiftLeft':0x2A,'ShiftRight':0x36,'ControlLeft':0x1D,'AltLeft':0x38,
        'MetaLeft':0xE05B,'MetaRight':0xE05C,'OSLeft':0xE05B,'OSRight':0xE05C,
        'Escape':0x01,'Backspace':0x0E,'Tab':0x0F,'Enter':0x1C,'Space':0x39,
        'CapsLock':0x3A,
        'Minus':0x0C,'Equal':0x0D,'BracketLeft':0x1A,'BracketRight':0x1B,
        'Backslash':0x2B,'Semicolon':0x27,'Quote':0x28,'Backquote':0x29,
        'Comma':0x33,'Period':0x34,'Slash':0x35,
        'ArrowUp':0xE048,'ArrowDown':0xE050,'ArrowLeft':0xE04B,'ArrowRight':0xE04D,
        'Home':0xE047,'End':0xE04F,'PageUp':0xE049,'PageDown':0xE051,
        'Insert':0xE052,'Delete':0xE053
    };

    // Keyboard events
    canvas.addEventListener('keydown', (e) => {
        e.preventDefault();
        const sc = codeToScancode[e.code];
        if (sc !== undefined && ws && ws.readyState === 1) {
            ws.send(JSON.stringify({type:'key', code:e.code, scancode:sc, pressed:true}));
        }
    });

    canvas.addEventListener('keyup', (e) => {
        e.preventDefault();
        const sc = codeToScancode[e.code];
        if (sc !== undefined && ws && ws.readyState === 1) {
            ws.send(JSON.stringify({type:'key', code:e.code, scancode:sc, pressed:false}));
        }
    });

    // Mouse coordinate translation
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = screenWidth / rect.width;
        const scaleY = screenHeight / rect.height;
        return {
            x: Math.round((e.clientX - rect.left) * scaleX),
            y: Math.round((e.clientY - rect.top) * scaleY)
        };
    }

    // Mouse events
    canvas.addEventListener('mousemove', (e) => {
        if (!ws || ws.readyState !== 1) return;
        const pos = getMousePos(e);
        ws.send(JSON.stringify({type:'mouse', x:pos.x, y:pos.y, button:0, eventType:'move'}));
    });

    canvas.addEventListener('mousedown', (e) => {
        e.preventDefault();
        canvas.focus();
        if (!ws || ws.readyState !== 1) return;
        const pos = getMousePos(e);
        ws.send(JSON.stringify({type:'mouse', x:pos.x, y:pos.y, button:e.button, eventType:'down'}));
    });

    canvas.addEventListener('mouseup', (e) => {
        e.preventDefault();
        if (!ws || ws.readyState !== 1) return;
        const pos = getMousePos(e);
        ws.send(JSON.stringify({type:'mouse', x:pos.x, y:pos.y, button:e.button, eventType:'up'}));
    });

    // Prevent context menu on right-click
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // FPS counter
    setInterval(() => {
        // Force canvas focus hint
    }, 5000);
})();
</script>
</body>
</html>
