server {
    listen 80 default_server;
    server_name _;

    # iDRAC-style headers
    add_header X-iDRAC-Version "6.10.00.00" always;
    add_header Server "iDRAC/9" always;

    root /usr/share/nginx/html;
    index index.html;

    # ALL paths require Basic Auth
    location / {
        auth_basic "iDRAC";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    # Health check (unauthenticated)
    location /health {
        auth_basic off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
