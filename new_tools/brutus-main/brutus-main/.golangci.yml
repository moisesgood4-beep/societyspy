version: "2"

run:
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - unparam
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/praetorian-inc/brutus
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
