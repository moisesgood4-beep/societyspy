# Integration workflow for browser plugin (requires secrets + environment)
# Runs only on push to main - separated from PR workflow to avoid
# startup_failure with environment branch policies.

name: Browser Plugin Integration

on:
  push:
    branches: [main]
    paths:
      - 'internal/plugins/browser/**'
      - 'internal/analyzers/claude/**'
      - 'internal/analyzers/perplexity/**'
      - '.github/workflows/browser-plugin-integration.yml'

permissions:
  contents: read

jobs:
  # Vision API tests (requires ANTHROPIC_API_KEY)
  vision-api-tests:
    name: Vision API Tests
    runs-on: ubuntu-latest
    environment: internal
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.0'
          cache: true

      - name: Verify Chrome installation
        run: google-chrome --version

      - name: Check for API key
        id: check-key
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::ANTHROPIC_API_KEY not set - skipping vision API tests"
          fi

      - name: Run Vision API tests
        if: steps.check-key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CGO_ENABLED=0 go test -v -tags=vision_api ./internal/analyzers/claude/... -timeout 2m

  # Full pipeline test (requires API keys + Chrome)
  full-pipeline-test:
    name: Full Pipeline Test
    runs-on: ubuntu-latest
    environment: internal
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.0'
          cache: true

      - name: Verify Chrome installation
        run: google-chrome --version

      - name: Build mock services
        run: |
          cd internal/plugins/browser/testdata/mocks
          for device in router camera printer nas generic; do
            CGO_ENABLED=0 go build -o mock-$device ./$device/
          done

          PORT=8081 ./mock-router &
          PORT=8082 ./mock-camera &
          PORT=8083 ./mock-printer &
          PORT=8084 ./mock-nas &
          PORT=8085 ./mock-generic &
          sleep 3

      - name: Run full pipeline test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          # Build brutus
          CGO_ENABLED=0 go build -o brutus ./cmd/brutus/

          # Test against mock router with browser plugin
          ./brutus web --target localhost:8081 --protocol browser -u admin -p admin --json || true
          ./brutus web --target localhost:8081 --protocol browser -u admin -p wrongpass --json || true

          echo "Full pipeline test complete"
