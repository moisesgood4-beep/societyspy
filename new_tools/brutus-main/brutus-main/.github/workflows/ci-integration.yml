name: Integration Tests

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.0'

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    environment: internal
    services:
      # SSH server for password testing
      ssh:
        image: linuxserver/openssh-server:latest
        env:
          PUID: 1000
          PGID: 1000
          PASSWORD_ACCESS: 'true'
          USER_NAME: testuser
          USER_PASSWORD: testpass
        ports:
          - 2222:2222

      # SSH server for key-based auth testing (using Vagrant insecure key)
      ssh-key:
        image: linuxserver/openssh-server:latest
        env:
          PUID: 1000
          PGID: 1000
          PASSWORD_ACCESS: 'false'
          USER_NAME: vagrant
          PUBLIC_KEY: 'ssh-rsa  vagrant insecure public key'
        ports:
          - 2223:2222

      # FTP server
      ftp:
        image: fauria/vsftpd
        env:
          FTP_USER: ftpuser
          FTP_PASS: ftppass
          PASV_ADDRESS: 127.0.0.1
          PASV_MIN_PORT: 21100
          PASV_MAX_PORT: 21110
        ports:
          - 21:21
          - 21100-21110:21100-21110

      # Telnet server
      telnet:
        image: wistic/telnetd
        ports:
          - 23:23

      # VNC server
      vnc:
        image: consol/rocky-xfce-vnc:latest
        env:
          VNC_PW: vncpass
        ports:
          - 5901:5901

      # SMB/Samba server
      smb:
        image: dperson/samba
        env:
          USER: smbuser;smbpass
          SHARE: public;/share
        ports:
          - 445:445
          - 139:139

      # LDAP server
      ldap:
        image: osixia/openldap:1.5.0
        env:
          LDAP_ORGANISATION: "Test Org"
          LDAP_DOMAIN: "test.local"
          LDAP_ADMIN_PASSWORD: adminpass
        ports:
          - 389:389
          - 636:636

      # MySQL
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      # PostgreSQL
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgrespass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # MSSQL Server
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: MssqlPass123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P MssqlPass123! -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      # Oracle Database
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_PASSWORD: oraclepass
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 20

      # MongoDB
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongouser
          MONGO_INITDB_ROOT_PASSWORD: mongopass
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis (with password)
      redis:
        image: bitnami/redis:latest
        ports:
          - 6379:6379
        env:
          REDIS_PASSWORD: redispass
        options: >-
          --health-cmd "redis-cli -a redispass ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Neo4j
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/neo4jpass
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      # Cassandra
      cassandra:
        image: cassandra:4
        env:
          CASSANDRA_AUTHENTICATOR: PasswordAuthenticator
          CASSANDRA_AUTHORIZER: CassandraAuthorizer
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -u cassandra -p cassandra -e 'DESCRIBE CLUSTER' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

      # CouchDB
      couchdb:
        image: couchdb:3
        env:
          COUCHDB_USER: couchuser
          COUCHDB_PASSWORD: couchpass
        ports:
          - 5984:5984
        options: >-
          --health-cmd "curl -f http://localhost:5984/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Elasticsearch
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        env:
          discovery.type: single-node
          xpack.security.enabled: 'true'
          ELASTIC_PASSWORD: elasticpass
          ES_JAVA_OPTS: '-Xms512m -Xmx512m'
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f -u elastic:elasticpass http://localhost:9200/_cluster/health || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

      # InfluxDB
      influxdb:
        image: influxdb:2
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: influxuser
          DOCKER_INFLUXDB_INIT_PASSWORD: influxpass
          DOCKER_INFLUXDB_INIT_ORG: testorg
          DOCKER_INFLUXDB_INIT_BUCKET: testbucket
        ports:
          - 8086:8086
        options: >-
          --health-cmd "curl -f http://localhost:8086/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Mail server (GreenMail - supports SMTP, IMAP, POP3)
      mailserver:
        image: greenmail/standalone:2.0.0
        env:
          GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=testuser:testpass@test.local"
        ports:
          - 3025:3025
          - 3110:3110
          - 3143:3143
          - 3465:3465
          - 3993:3993
          - 3995:3995

      # SNMP server
      snmp:
        image: polinux/snmpd:alpine
        ports:
          - 161:161/udp
        env:
          SNMP_COMMUNITY: public

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."

          # Network Services
          echo "Waiting for SSH..."
          timeout 60 bash -c 'until nc -z localhost 2222; do sleep 1; done' || true
          echo "Waiting for FTP..."
          timeout 60 bash -c 'until nc -z localhost 21; do sleep 1; done' || true
          echo "Waiting for Telnet..."
          timeout 60 bash -c 'until nc -z localhost 23; do sleep 1; done' || true
          echo "Waiting for VNC..."
          timeout 60 bash -c 'until nc -z localhost 5901; do sleep 1; done' || true

          # Enterprise
          echo "Waiting for SMB..."
          timeout 60 bash -c 'until nc -z localhost 445; do sleep 1; done' || true
          echo "Waiting for LDAP..."
          timeout 60 bash -c 'until nc -z localhost 389; do sleep 1; done' || true

          # Databases
          echo "Waiting for MySQL..."
          timeout 60 bash -c 'until nc -z localhost 3306; do sleep 1; done' || true
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until nc -z localhost 5432; do sleep 1; done' || true
          echo "Waiting for MSSQL..."
          timeout 120 bash -c 'until nc -z localhost 1433; do sleep 1; done' || true
          echo "Waiting for Oracle..."
          timeout 300 bash -c 'until nc -z localhost 1521; do sleep 2; done' || true
          echo "Waiting for MongoDB..."
          timeout 60 bash -c 'until nc -z localhost 27017; do sleep 1; done' || true
          echo "Waiting for Redis..."
          timeout 60 bash -c 'until nc -z localhost 6379; do sleep 1; done' || true
          echo "Waiting for Neo4j..."
          timeout 90 bash -c 'until nc -z localhost 7687; do sleep 1; done' || true
          echo "Waiting for Cassandra..."
          timeout 120 bash -c 'until nc -z localhost 9042; do sleep 1; done' || true
          echo "Waiting for CouchDB..."
          timeout 60 bash -c 'until nc -z localhost 5984; do sleep 1; done' || true
          echo "Waiting for Elasticsearch..."
          timeout 120 bash -c 'until nc -z localhost 9200; do sleep 1; done' || true
          echo "Waiting for InfluxDB..."
          timeout 60 bash -c 'until nc -z localhost 8086; do sleep 1; done' || true

          # Communications
          echo "Waiting for SMTP..."
          timeout 60 bash -c 'until nc -z localhost 3025; do sleep 1; done' || true
          echo "Waiting for IMAP..."
          timeout 60 bash -c 'until nc -z localhost 3143; do sleep 1; done' || true
          echo "Waiting for POP3..."
          timeout 60 bash -c 'until nc -z localhost 3110; do sleep 1; done' || true

          # SNMP (UDP)
          echo "Waiting for SNMP..."
          sudo apt-get update && sudo apt-get install -y snmp > /dev/null 2>&1 || true
          timeout 30 bash -c 'until snmpget -v2c -c public localhost:161 1.3.6.1.2.1.1.1.0 2>/dev/null; do sleep 1; done' || true

          # Extra time for slow services to fully initialize
          echo "Allowing extra initialization time..."
          sleep 30
          echo "All services should be ready"

      - name: Run integration tests
        run: CGO_ENABLED=0 go test -tags=integration -v -timeout 20m ./...
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Network Services
          SSH_TEST_HOST: localhost:2222
          SSH_TEST_USER: testuser
          SSH_TEST_PASS: testpass
          SSH_KEY_TEST_HOST: localhost:2223
          SSH_KEY_TEST_USER: vagrant
          FTP_TEST_HOST: localhost:21
          FTP_TEST_USER: ftpuser
          FTP_TEST_PASS: ftppass
          TELNET_TEST_HOST: localhost:23
          TELNET_TEST_USER: user
          TELNET_TEST_PASS: password
          VNC_TEST_HOST: localhost:5901
          VNC_TEST_PASS: vncpass
          # Enterprise Infrastructure
          SMB_TEST_HOST: localhost:445
          SMB_TEST_USER: smbuser
          SMB_TEST_PASS: smbpass
          LDAP_TEST_HOST: localhost:389
          LDAP_TEST_USER: cn=admin,dc=test,dc=local
          LDAP_TEST_PASS: adminpass
          # Databases
          MYSQL_TEST_HOST: localhost:3306
          MYSQL_TEST_USER: root
          MYSQL_TEST_PASS: rootpass
          POSTGRES_TEST_HOST: localhost:5432
          POSTGRES_TEST_USER: postgres
          POSTGRES_TEST_PASS: postgrespass
          MSSQL_TEST_HOST: localhost:1433
          MSSQL_TEST_USER: sa
          MSSQL_TEST_PASS: MssqlPass123!
          ORACLE_TEST_HOST: localhost:1521
          ORACLE_TEST_USER: system
          ORACLE_TEST_PASS: oraclepass
          MONGODB_TEST_HOST: localhost:27017
          MONGODB_TEST_USER: mongouser
          MONGODB_TEST_PASS: mongopass
          REDIS_TEST_HOST: localhost:6379
          REDIS_TEST_PASS: redispass
          NEO4J_TEST_HOST: localhost:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASS: neo4jpass
          CASSANDRA_TEST_HOST: localhost:9042
          CASSANDRA_TEST_USER: cassandra
          CASSANDRA_TEST_PASS: cassandra
          COUCHDB_TEST_HOST: localhost:5984
          COUCHDB_TEST_USER: couchuser
          COUCHDB_TEST_PASS: couchpass
          ELASTICSEARCH_TEST_HOST: localhost:9200
          ELASTICSEARCH_TEST_USER: elastic
          ELASTICSEARCH_TEST_PASS: elasticpass
          INFLUXDB_TEST_HOST: localhost:8086
          INFLUXDB_TEST_USER: influxuser
          INFLUXDB_TEST_PASS: influxpass
          # Communications
          SMTP_TEST_HOST: localhost:3025
          SMTP_TEST_USER: testuser
          SMTP_TEST_PASS: testpass
          IMAP_TEST_HOST: localhost:3143
          IMAP_TEST_USER: testuser
          IMAP_TEST_PASS: testpass
          POP3_TEST_HOST: localhost:3110
          POP3_TEST_USER: testuser
          POP3_TEST_PASS: testpass
          # SNMP
          SNMP_TEST_HOST: localhost:161
          SNMP_TEST_COMMUNITY: public
